# Run `uv tool install pre-commit && pre-commit install` once after cloning.
# After that every commit will run these checks automatically.
# Bypass with `git commit --no-verify` when you really mean it.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        name: ruff (lint)
        args: ["--fix"]
        files: ^api/
      - id: ruff-format
        name: ruff (format)
        files: ^api/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^web/.*\.(ts|tsx|js|jsx|json|css|md)$
        exclude: ^web/(\.next|node_modules)/
