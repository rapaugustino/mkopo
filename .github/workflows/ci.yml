name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mkopo
          POSTGRES_PASSWORD: mkopo
          POSTGRES_DB: mkopo
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U mkopo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://mkopo:mkopo@localhost:5432/mkopo
      DATABASE_URL_SYNC: postgresql+psycopg://mkopo:mkopo@localhost:5432/mkopo
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: dummy
      ENVIRONMENT: development

    defaults:
      run:
        working-directory: ./api

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.22"
          enable-cache: true
          cache-dependency-glob: "api/uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format --check)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy mkopo
        continue-on-error: true # tighten as the codebase stabilises

      - name: Migrations
        run: uv run alembic upgrade head

      - name: Unit tests
        run: uv run pytest tests/ -v

      - name: Eval gate
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: uv run python -m evals.runner

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_DEV_TOKEN: dev-token-replace-me
