  rule. ``conditional`` with a "send us your W-2" condition.
inputs:
  loan_class: personal
  rule_outcomes:
    - rule_id: personal_doc_completeness
      severity: block
      passed: false
      message: "Missing required documents: w2"
    - rule_id: credit_score_floor
      severity: block
      passed: true
