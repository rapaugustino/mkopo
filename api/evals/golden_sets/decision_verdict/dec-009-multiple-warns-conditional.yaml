id: dec-009-multiple-warns-conditional
description: |
  Two warning-severity rules fail (debt yield + appraisal age) but
  no blocking failures. The thresholds suggest the deal is workable
  with explicit conditions. ``conditional`` is the more defensible
  answer than ``approve``.
inputs:
  loan_class: business
  rule_outcomes:
    - rule_id: doc_completeness
      severity: block
      passed: true
      message: All required documents present.
    - rule_id: ltv_under_cap
      severity: block
      passed: true
      message: LTV 0.67 within cap.
    - rule_id: dscr_above_floor
      severity: block
      passed: true
      message: DSCR 1.22 above 1.20 floor (slim margin).
    - rule_id: debt_yield_above_floor
      severity: warn
      passed: false
      message: Debt yield 7.6% under 8.0% floor.
    - rule_id: appraisal_age
      severity: warn
      passed: false
      message: Appraisal 168 days old.
  extractions:
    borrower_entity: Industrial Park 5 LLC
    property_type: industrial warehouse
    loan_amount: "3,200,000"
expected:
  path: conditional
metadata:
  scenario: multi-warn-conditional
